<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NutriTrack – Day 100+ 🔥</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>

    <link rel="icon" type="image/png" href="r-icon5.jpg" />
    <link rel="apple-touch-icon" href="r-icon5.jpg" />

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "app-bg-dark": "#0f172a",
              "card-dark": "#1e293b",
              "text-dark-primary": "#f1f5f9",
              "text-dark-secondary": "#94a3b8",
              "accent-emerald": "#10b981",
              "accent-teal": "#2dd4bf",
              "status-good": "#34d399",
              "status-low": "#fbbf24",
              "status-high": "#f87171",
              "nutri-emerald": {
                50: "#ecfdf5",
                100: "#d1fae5",
                200: "#a7f3d0",
                300: "#6ee7b7",
                400: "#34d399",
                500: "#10b981",
                600: "#059669",
                700: "#047857",
                800: "#065f46",
                900: "#064e3b",
              },
              "nutri-bluegray": {
                50: "#f8fafc",
                100: "#f1f5f9",
                200: "#e2e8f0",
                300: "#cbd5e1",
                400: "#94a3b8",
                500: "#64748b",
                600: "#475569",
                700: "#334155",
                800: "#1e293b",
                900: "#0f172a",
              },
            },
            boxShadow: {
              card: "0 4px 15px -3px rgba(0, 0, 0, 0.1), 0 2px 6px -2px rgba(0, 0, 0, 0.05)",
            },
          },
        },
      };
    </script>

    <script>
      if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>

    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        @apply bg-nutri-bluegray-50 text-nutri-bluegray-900 dark:bg-app-bg-dark dark:text-text-dark-primary transition-colors duration-300 min-h-screen;
      }
      .card {
        @apply bg-white dark:bg-card-dark rounded-2xl p-5 shadow-card border border-nutri-bluegray-200 dark:border-nutri-bluegray-700;
      }

      .bg-nutri-bluegray-100-light {
        @apply bg-nutri-bluegray-100 border-nutri-bluegray-200;
      }
      .dark .bg-nutri-bluegray-100-dark {
        @apply bg-card-dark border-nutri-bluegray-700;
      }

      .dark #tcal,
      .dark #tprot,
      .dark #tfat,
      .dark #tsug {
        @apply text-text-dark-primary;
      }
      .status-low {
        @apply text-amber-600 dark:text-amber-400;
      }
      .status-good {
        @apply text-emerald-600 dark:text-emerald-400 font-semibold;
      }
      .status-high {
        @apply text-rose-600 dark:text-rose-400;
      }
      .fire-emoji {
        display: inline-block;
        font-size: 1.4em;
        animation: pulse-glow 2s infinite ease-in-out;
      }
      @keyframes pulse-glow {
        0%,
        100% {
          filter: brightness(1) drop-shadow(0 0 8px #10b981);
        }
        50% {
          filter: brightness(1.4) drop-shadow(0 0 16px #2dd4bf);
        }
      }

      .food-result-item {
        @apply flex justify-between items-center p-3 bg-nutri-bluegray-50 dark:bg-nutri-bluegray-800 rounded-xl hover:bg-nutri-emerald-50 dark:hover:bg-nutri-emerald-900/30 cursor-pointer mb-2 border border-transparent transition-all;
      }
      .food-result-item.personalized {
        @apply border-l-4 border-l-nutri-emerald-500 bg-nutri-emerald-50/50 dark:bg-nutri-emerald-900/20;
      }
    </style>
  </head>

  <body class="min-h-screen" id="app-body">
    <div class="max-w-3xl mx-auto p-5 pb-12">
      <header
        class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8"
      >
        <div>
          <h1
            class="text-4xl font-bold bg-gradient-to-r from-nutri-emerald-600 to-teal-500 bg-clip-text text-transparent"
          >
            NutriTrack
          </h1>
          <div class="mt-1 flex items-center gap-2 text-lg">
            <span>Day Streak:</span>
            <span
              id="streak"
              class="font-bold text-nutri-emerald-700 dark:text-nutri-emerald-300"
              >0</span
            >
            <span id="fire" class="fire-emoji">🔥</span>
          </div>
          <p
            id="quote"
            class="text-sm italic text-nutri-bluegray-500 dark:text-nutri-bluegray-400 mt-1"
          ></p>
          <button
            onclick="newQuote()"
            class="text-xs text-nutri-emerald-600 dark:text-nutri-emerald-400 hover:underline dark:hover:text-nutri-emerald-300"
          >
            new quote
          </button>
        </div>
      </header>

      <div class="card mb-6 grid grid-cols-1 sm:grid-cols-3 gap-4">
        <input
          id="date"
          type="date"
          class="border rounded-xl p-3 focus:ring-nutri-emerald-500 focus:border-nutri-emerald-500 dark:bg-nutri-bluegray-800 dark:border-nutri-bluegray-600 dark:text-text-dark-primary"
        />
        <div class="relative">
          <input
            id="weight"
            type="number"
            step="0.1"
            min="30"
            max="200"
            placeholder="Weight"
            class="border rounded-xl p-3 pr-12 text-center focus:ring-nutri-emerald-500 focus:border-nutri-emerald-500 w-full dark:bg-nutri-bluegray-800 dark:border-nutri-bluegray-600 dark:text-text-dark-primary"
          />
          <span
            class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-nutri-bluegray-500 dark:text-nutri-bluegray-400 font-medium"
            >kg</span
          >
        </div>
        <select
          id="workout"
          class="border rounded-xl p-3 focus:ring-nutri-emerald-500 focus:border-nutri-emerald-500 dark:bg-nutri-bluegray-800 dark:border-nutri-bluegray-600 dark:text-text-dark-primary"
        >
          <option value="">No workout</option>
          <option>Upper Body</option>
          <option>Lower Body</option>
          <option>Recovery Walk</option>
          <option>Full Body</option>
        </select>
      </div>

      <div class="flex flex-col md:flex-row gap-4 items-start mb-6">
        <div
          class="flex-1 text-sm text-nutri-bluegray-600 dark:text-nutri-bluegray-300 bg-nutri-bluegray-100 dark:bg-card-dark p-5 rounded-xl border border-nutri-emerald-200 shadow-sm dark:border-nutri-emerald-900/30"
        >
          <strong class="block text-base mb-3"
            >Today's Targets (click to edit)</strong
          >

          <div class="space-y-2">
            <div class="flex items-center gap-2">
              <label class="w-24 md:w-32 font-medium">Calories:</label>
              <input
                id="targetCal"
                type="number"
                step="0.01"
                value="1500"
                class="w-20 md:w-24 border rounded px-2 py-1 text-center focus:ring-nutri-emerald-500 dark:bg-nutri-bluegray-800 dark:border-nutri-bluegray-600 dark:text-text-dark-primary"
              />
              <span class="text-nutri-emerald-600">kcal</span>
              <span class="text-xs text-nutri-bluegray-500">max</span>
              <input
                id="maxCal"
                type="number"
                step="0.01"
                value="1700"
                class="w-16 md:w-20 border rounded px-2 py-1 text-center text-sm dark:bg-nutri-bluegray-800 dark:border-nutri-bluegray-600 dark:text-text-dark-primary"
              />
            </div>

            <div class="flex items-center gap-2">
              <label class="w-24 md:w-32 font-medium">Proteins:</label>
              <input
                id="targetProt"
                type="number"
                step="0.01"
                value="100"
                class="w-20 md:w-24 border rounded px-2 py-1 text-center focus:ring-nutri-emerald-500 dark:bg-nutri-bluegray-800 dark:border-nutri-bluegray-600 dark:text-text-dark-primary"
              />
              <span class="text-nutri-emerald-600">grams</span>
              <span class="text-xs text-nutri-bluegray-500">up to</span>
              <input
                id="maxProt"
                type="number"
                step="0.01"
                value="130"
                class="w-16 md:w-20 border rounded px-2 py-1 text-center text-sm dark:bg-nutri-bluegray-800 dark:border-nutri-bluegray-600 dark:text-text-dark-primary"
              />
            </div>

            <div class="flex items-center gap-2">
              <label class="w-24 md:w-32 font-medium">Fats:</label>
              <input
                id="targetFat"
                type="number"
                step="0.01"
                value="50"
                class="w-20 md:w-24 border rounded px-2 py-1 text-center focus:ring-nutri-emerald-500 dark:bg-nutri-bluegray-800 dark:border-nutri-bluegray-600 dark:text-text-dark-primary"
              />
              <span class="text-nutri-emerald-600">grams</span>
              <span class="text-xs text-nutri-bluegray-500">up to</span>
              <input
                id="maxFat"
                type="number"
                step="0.01"
                value="70"
                class="w-16 md:w-20 border rounded px-2 py-1 text-center text-sm dark:bg-nutri-bluegray-800 dark:border-nutri-bluegray-600 dark:text-text-dark-primary"
              />
            </div>

            <div class="flex items-center gap-2">
              <label class="w-24 md:w-32 font-medium">Sugar:</label>
              <input
                id="targetSug"
                type="number"
                step="0.01"
                value="30"
                class="w-20 md:w-24 border rounded px-2 py-1 text-center focus:ring-nutri-emerald-500 dark:bg-nutri-bluegray-800 dark:border-nutri-bluegray-600 dark:text-text-dark-primary"
              />
              <span class="text-nutri-emerald-600">grams</span>
              <span class="text-xs text-nutri-bluegray-500">up to</span>
              <input
                id="maxSug"
                type="number"
                step="0.01"
                value="45"
                class="w-16 md:w-20 border rounded px-2 py-1 text-center text-sm dark:bg-nutri-bluegray-800 dark:border-nutri-bluegray-600 dark:text-text-dark-primary"
              />
            </div>
          </div>
        </div>

        <div
          class="w-full md:w-80 p-5 bg-nutri-bluegray-50 dark:bg-nutri-bluegray-800 rounded-xl shadow-sm border border-nutri-emerald-200 dark:border-nutri-emerald-900/30"
        >
          <h3
            class="text-sm font-semibold text-nutri-emerald-700 dark:text-nutri-emerald-300 mb-4 text-center"
          >
            Remaining Today
          </h3>
          <div class="grid grid-cols-2 gap-4 text-center">
            <div>
              <div
                class="text-xl font-bold text-nutri-emerald-600 dark:text-nutri-emerald-400"
                id="remainCal"
              >
                900
              </div>
              <div
                class="text-xs text-nutri-bluegray-600 dark:text-nutri-bluegray-400"
              >
                Calories
              </div>
            </div>
            <div>
              <div
                class="text-xl font-bold text-nutri-emerald-600 dark:text-nutri-emerald-400"
                id="remainProt"
              >
                74
              </div>
              <div
                class="text-xs text-nutri-bluegray-600 dark:text-nutri-bluegray-400"
              >
                Protein (g)
              </div>
            </div>
            <div>
              <div
                class="text-xl font-bold text-nutri-emerald-600 dark:text-nutri-emerald-400"
                id="remainFat"
              >
                26
              </div>
              <div
                class="text-xs text-nutri-bluegray-600 dark:text-nutri-bluegray-400"
              >
                Fat (g)
              </div>
            </div>
            <div>
              <div
                class="text-xl font-bold text-nutri-emerald-600 dark:text-nutri-emerald-400"
                id="remainSug"
              >
                0
              </div>
              <div
                class="text-xs text-nutri-bluegray-600 dark:text-nutri-bluegray-400"
              >
                Sugar (g)
              </div>
            </div>
          </div>
          <div
            id="remainPercent"
            class="mt-4 text-center text-xs font-medium text-nutri-emerald-700 dark:text-nutri-emerald-300"
          ></div>
        </div>
      </div>

      <div class="card mb-6">
        <div class="flex gap-3">
          <input
            id="foodInput"
            placeholder="Type food (chicken, rice, egg...)"
            class="flex-1 border rounded-xl p-3 focus:ring-nutri-emerald-500 focus:border-nutri-emerald-500 dark:bg-nutri-bluegray-800 dark:border-nutri-bluegray-600 dark:text-text-dark-primary"
          />
          <button
            onclick="lookupFood()"
            class="bg-nutri-emerald-600 hover:bg-nutri-emerald-700 text-white px-6 rounded-xl font-medium transition shadow-md dark:bg-emerald-600 dark:hover:bg-emerald-400 dark:shadow-emerald-500/30"
          >
            Search
          </button>
        </div>
        <div
          id="lookupResults"
          class="mt-4 space-y-2 max-h-60 overflow-y-auto"
        ></div>

        <div
          class="mt-4 pt-4 border-t border-nutri-bluegray-200 dark:border-nutri-bluegray-700"
        >
          <button
            onclick="showAddPersonalizedFoodModal()"
            class="w-full border-2 border-dashed border-nutri-emerald-400 text-nutri-emerald-600 dark:text-nutri-emerald-400 hover:bg-nutri-emerald-50 dark:hover:bg-nutri-emerald-900/30 font-medium p-3 rounded-xl transition flex items-center justify-center gap-2"
          >
            <span>+</span> Add My Own Pinoy Food
          </button>
        </div>
      </div>

      <div id="mealContainer" class="grid gap-6 mb-8"></div>

      <div class="card mb-8">
        <h3 class="font-semibold text-lg mb-4 dark:text-text-dark-primary">
          Today's Totals
        </h3>
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 text-center">
          <div>
            <div
              id="tcal"
              class="text-3xl font-bold text-nutri-bluegray-900 dark:text-text-dark-primary"
            >
              0
            </div>
            <div
              class="text-xs uppercase tracking-wide text-nutri-bluegray-600 dark:text-text-dark-secondary"
            >
              kcal
            </div>
            <div id="calStatus" class="text-sm mt-1"></div>
          </div>
          <div>
            <div
              id="tprot"
              class="text-3xl font-bold text-nutri-bluegray-900 dark:text-text-dark-primary"
            >
              0
            </div>
            <div
              class="text-xs uppercase tracking-wide text-nutri-bluegray-600 dark:text-text-dark-secondary"
            >
              protein (g)
            </div>
            <div id="protStatus" class="text-sm mt-1"></div>
          </div>
          <div>
            <div
              id="tfat"
              class="text-3xl font-bold text-nutri-bluegray-900 dark:text-text-dark-primary"
            >
              0
            </div>
            <div
              class="text-xs uppercase tracking-wide text-nutri-bluegray-600 dark:text-text-dark-secondary"
            >
              fat (g)
            </div>
            <div id="fatStatus" class="text-sm mt-1"></div>
          </div>
          <div>
            <div
              id="tsug"
              class="text-3xl font-bold text-nutri-bluegray-900 dark:text-text-dark-primary"
            >
              0
            </div>
            <div
              class="text-xs uppercase tracking-wide text-nutri-bluegray-600 dark:text-text-dark-secondary"
            >
              sugar (g)
            </div>
            <div id="sugStatus" class="text-sm mt-1"></div>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-10">
        <button
          onclick="saveDay()"
          class="bg-nutri-emerald-600 hover:bg-nutri-emerald-700 text-white font-semibold p-4 rounded-xl transition shadow-md dark:bg-emerald-600 dark:hover:bg-emerald-400 dark:shadow-emerald-500/30 hover:shadow-lg hover:scale-[1.02]"
        >
          Save Day
        </button>
        <button
          onclick="clearToday()"
          class="bg-rose-100 hover:bg-rose-200 text-rose-800 dark:bg-rose-800/60 dark:hover:bg-rose-700/80 dark:text-rose-100 font-semibold p-4 rounded-xl transition"
        >
          Clear Today
        </button>
        <button
          onclick="showReport()"
          class="border-2 border-nutri-emerald-600 text-nutri-emerald-700 dark:border-nutri-emerald-400 dark:text-nutri-emerald-300 hover:bg-nutri-emerald-50 dark:hover:bg-nutri-emerald-900/30 font-semibold p-4 rounded-xl transition"
        >
          Your Report 📝
        </button>
      </div>
      <section>
        <div class="flex justify-between items-center mb-4">
          <h3 class="font-semibold text-lg dark:text-text-dark-primary">
            History
          </h3>
          <div class="flex gap-2">
            <button
              onclick="toggleHistoryView()"
              id="historyToggle"
              class="bg-nutri-bluegray-100 hover:bg-nutri-bluegray-200 text-nutri-bluegray-700 dark:bg-nutri-bluegray-800 dark:hover:bg-nutri-bluegray-700 dark:text-nutri-bluegray-300 px-3 py-1.5 rounded-lg text-sm font-medium transition flex items-center gap-1.5"
            >
              📅 Show All
            </button>
            <button
              onclick="exportData()"
              class="bg-nutri-emerald-100 hover:bg-nutri-emerald-200 text-nutri-emerald-700 dark:bg-nutri-emerald-900/50 dark:hover:bg-nutri-emerald-900 dark:text-nutri-emerald-300 px-3 py-1.5 rounded-lg text-sm font-medium transition flex items-center gap-1.5"
            >
              📤 Export
            </button>
            <button
              onclick="document.getElementById('importFile').click()"
              class="bg-nutri-bluegray-100 hover:bg-nutri-bluegray-200 text-nutri-bluegray-700 dark:bg-nutri-bluegray-800 dark:hover:bg-nutri-bluegray-700 dark:text-nutri-bluegray-300 px-3 py-1.5 rounded-lg text-sm font-medium transition flex items-center gap-1.5"
            >
              📥 Import
            </button>
            <input
              type="file"
              id="importFile"
              accept=".json"
              class="hidden"
              onchange="importData(this)"
            />
          </div>
        </div>
        <div id="history" class="space-y-3"></div>
      </section>
    </div>

    <div
      id="addFoodModal"
      class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 hidden"
    >
      <div class="bg-white dark:bg-card-dark rounded-2xl p-6 max-w-md w-full">
        <div class="flex justify-between items-center mb-4">
          <h3
            class="text-xl font-bold text-nutri-bluegray-900 dark:text-text-dark-primary"
          >
            Add Personalized Food
          </h3>
          <button
            onclick="closeAddFoodModal()"
            class="text-rose-600 hover:text-rose-800 text-2xl"
          >
            &times;
          </button>
        </div>
        <div class="space-y-3">
          <input
            id="newFoodName"
            type="text"
            placeholder="Food name (e.g., My Special Adobo)"
            class="w-full border rounded-xl p-3 dark:bg-nutri-bluegray-800 dark:border-nutri-bluegray-600 dark:text-text-dark-primary"
          />
          <div class="grid grid-cols-2 gap-3">
            <input
              id="newFoodCal"
              type="number"
              step="0.01"
              placeholder="Calories"
              class="border rounded-xl p-3 dark:bg-nutri-bluegray-800 dark:border-nutri-bluegray-600 dark:text-text-dark-primary"
            />
            <input
              id="newFoodProt"
              type="number"
              step="0.01"
              placeholder="Protein (g)"
              class="border rounded-xl p-3 dark:bg-nutri-bluegray-800 dark:border-nutri-bluegray-600 dark:text-text-dark-primary"
            />
          </div>
          <div class="grid grid-cols-2 gap-3">
            <input
              id="newFoodFat"
              type="number"
              step="0.01"
              placeholder="Fat (g)"
              class="border rounded-xl p-3 dark:bg-nutri-bluegray-800 dark:border-nutri-bluegray-600 dark:text-text-dark-primary"
            />
            <input
              id="newFoodSug"
              type="number"
              step="0.01"
              placeholder="Sugar (g)"
              class="border rounded-xl p-3 dark:bg-nutri-bluegray-800 dark:border-nutri-bluegray-600 dark:text-text-dark-primary"
            />
          </div>
          <button
            onclick="savePersonalizedFood()"
            class="w-full bg-nutri-emerald-600 hover:bg-nutri-emerald-700 text-white font-semibold p-3 rounded-xl transition mt-2"
          >
            Save to My Foods
          </button>
        </div>
      </div>
    </div>

    <script>
      function loadPersonalizedFoods() {
        const saved = localStorage.getItem("personalizedPinoyFoods");
        return saved ? JSON.parse(saved) : {};
      }

      function savePersonalizedFoods(foods) {
        localStorage.setItem("personalizedPinoyFoods", JSON.stringify(foods));
      }

      function getAllFoods() {
        const personalized = loadPersonalizedFoods();
        return { ...pinoyFallback, ...personalized };
      }

      function showAddPersonalizedFoodModal() {
        document.getElementById("addFoodModal").classList.remove("hidden");
      }

      function closeAddFoodModal() {
        document.getElementById("addFoodModal").classList.add("hidden");
        document.getElementById("newFoodName").value = "";
        document.getElementById("newFoodCal").value = "";
        document.getElementById("newFoodProt").value = "";
        document.getElementById("newFoodFat").value = "";
        document.getElementById("newFoodSug").value = "";
      }

      function savePersonalizedFood() {
        const name = document
          .getElementById("newFoodName")
          .value.trim()
          .toLowerCase();
        const cal =
          parseFloat(document.getElementById("newFoodCal").value) || 0;
        const prot =
          parseFloat(document.getElementById("newFoodProt").value) || 0;
        const fat =
          parseFloat(document.getElementById("newFoodFat").value) || 0;
        const sug =
          parseFloat(document.getElementById("newFoodSug").value) || 0;

        if (!name) {
          alert("Please enter a food name");
          return;
        }

        if (cal <= 0) {
          alert("Please enter valid calories");
          return;
        }

        const personalized = loadPersonalizedFoods();

        if (pinoyFallback[name]) {
          if (
            !confirm(
              `"${name}" already exists in default foods. Overwrite with your version?`,
            )
          ) {
            return;
          }
        }

        personalized[name] = { cal, prot, fat, sug };
        savePersonalizedFoods(personalized);

        alert(`"${name}" saved to your personalized foods!`);
        closeAddFoodModal();

        const searchTerm = document.getElementById("foodInput").value.trim();
        if (searchTerm) {
          lookupFood();
        }
      }

      function lookupFood() {
        const term = document
          .getElementById("foodInput")
          .value.trim()
          .toLowerCase();
        const results = document.getElementById("lookupResults");
        const allFoods = getAllFoods();
        const personalized = loadPersonalizedFoods();

        if (!term) {
          results.innerHTML = "";
          return;
        }

        results.innerHTML = "";
        let found = false;

        for (const name in allFoods) {
          if (name.toLowerCase().includes(term)) {
            const vals = allFoods[name];
            const isPersonalized = personalized.hasOwnProperty(name);
            const div = document.createElement("div");

            div.className = `food-result-item ${isPersonalized ? "personalized" : ""}`;

            const sourceBadge = isPersonalized
              ? '<span class="text-xs bg-nutri-emerald-100 dark:bg-nutri-emerald-900 text-nutri-emerald-700 dark:text-nutri-emerald-300 px-2 py-0.5 rounded-full ml-2">My Food</span>'
              : '<span class="text-xs text-nutri-bluegray-400">Pinoy Favorite</span>';

            div.innerHTML = `
              <div class="flex-1">
                <div class="font-medium text-nutri-bluegray-900 dark:text-text-dark-primary flex items-center">
                  ${name}
                  ${sourceBadge}
                </div>
              </div>
              <div class="text-sm text-right text-nutri-bluegray-700 dark:text-text-dark-secondary">
                ${vals.cal} kcal • ${vals.prot}p • ${vals.fat}f • ${vals.sug}s
              </div>
            `;

            div.onclick = () => {
              applyFoodToCurrentMeal(vals, name);
              results.innerHTML = "";
              document.getElementById("foodInput").value = "";
            };

            results.appendChild(div);
            found = true;
          }
        }

        if (!found) {
          results.innerHTML = `
            <div class="p-4 text-center text-nutri-bluegray-500 dark:text-nutri-bluegray-400">
              <p class="mb-2">No foods found matching "${term}"</p>
              <button onclick="showAddPersonalizedFoodModal(); document.getElementById('newFoodName').value = '${term}'" 
                class="text-nutri-emerald-600 hover:underline text-sm">
                Add "${term}" as your personalized food
              </button>
            </div>
          `;
        }
      }
    </script>

    <script>
      const meals = [
        { id: "breakfast", emoji: "🌞", name: "Breakfast" },
        { id: "lunch", emoji: "🍱", name: "Lunch" },
        { id: "snack", emoji: "🥜", name: "Snack" },
        { id: "dinner", emoji: "🌙", name: "Dinner" },
      ];

      let nutritionData =
        JSON.parse(localStorage.getItem("nutritionData")) || [];
      let currentDate = getLocalDateString();

      function getLocalDateString(date = new Date()) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function parseLocalDate(dateStr) {
        const [year, month, day] = dateStr.split("-").map(Number);
        return new Date(year, month - 1, day);
      }

      function diffDays(dateA, dateB) {
        const msPerDay = 1000 * 60 * 60 * 24;
        const utcA = Date.UTC(
          dateA.getFullYear(),
          dateA.getMonth(),
          dateA.getDate(),
        );
        const utcB = Date.UTC(
          dateB.getFullYear(),
          dateB.getMonth(),
          dateB.getDate(),
        );
        return Math.round((utcA - utcB) / msPerDay);
      }

      function formatNumber(value, decimals = 2) {
        const num = Number(value) || 0;
        return Number.isInteger(num) ? String(num) : num.toFixed(decimals);
      }

      function getTargets() {
        return {
          cal: {
            target: Number(document.getElementById("targetCal")?.value) || 1500,
            max: Number(document.getElementById("maxCal")?.value) || 1700,
          },
          prot: {
            target: Number(document.getElementById("targetProt")?.value) || 100,
            max: Number(document.getElementById("maxProt")?.value) || 130,
          },
          fat: {
            target: Number(document.getElementById("targetFat")?.value) || 50,
            max: Number(document.getElementById("maxFat")?.value) || 70,
          },
          sug: {
            target: Number(document.getElementById("targetSug")?.value) || 30,
            max: Number(document.getElementById("maxSug")?.value) || 45,
          },
        };
      }

      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("date").value = currentDate;

        if (nutritionData.length > 0) {
          const lastEntry = [...nutritionData]
            .sort((a, b) => a.date.localeCompare(b.date))
            .at(-1);
          if (lastEntry?.weight != null && !isNaN(lastEntry.weight)) {
            document.getElementById("weight").value = lastEntry.weight;
          }
        }

        renderMeals();
        loadTempMeals();
        loadLiveFields();
        loadStreak();
        renderHistory();
        addInputListeners();
        computeTotals();
        newQuote();
      });

      document.getElementById("foodInput").addEventListener("focus", () => {
        document.getElementById("lookupResults").innerHTML = "";
      });

      function renderMeals() {
        const container = document.getElementById("mealContainer");
        container.innerHTML = "";
        meals.forEach((m) => {
          const section = document.createElement("div");
          section.className = "card";
          section.innerHTML = `
            <div class="flex justify-between items-center mb-4">
              <h3 class="text-lg font-semibold dark:text-text-dark-primary">${m.emoji} ${m.name}</h3>
              <div class="flex gap-3">
                <button onclick="addFoodRow('${m.id}')" class="text-nutri-emerald-600 hover:text-nutri-emerald-800 dark:text-nutri-emerald-400 dark:hover:text-nutri-emerald-300 text-sm font-medium">+ Add food</button>
                <button onclick="clearMeal('${m.id}')" class="text-rose-600 hover:text-rose-800 dark:text-rose-400 dark:hover:text-rose-300 text-sm">Clear</button>
              </div>
            </div>
            <div id="${m.id}_foods" class="space-y-3">
              ${createFoodRowHTML(m.id, 0)}
            </div>
          `;
          container.appendChild(section);
        });
      }

      function createFoodRowHTML(mealId, index) {
        return `
          <div class="grid grid-cols-6 gap-3 items-center food-row" data-index="${index}">
            <input placeholder="food name" type="text" class="border rounded-xl p-2.5 text-center focus:ring-nutri-emerald-500 col-span-1 text-sm dark:bg-nutri-bluegray-800 dark:border-nutri-bluegray-600 dark:text-text-dark-primary dark:placeholder-nutri-bluegray-500" data-field="name">
            <input placeholder="kcal" type="number" step="0.01" class="border rounded-xl p-2.5 text-center focus:ring-nutri-emerald-500 dark:bg-nutri-bluegray-800 dark:border-nutri-bluegray-600 dark:text-text-dark-primary dark:placeholder-nutri-bluegray-500" data-field="cal">
            <input placeholder="prot" type="number" step="0.01" class="border rounded-xl p-2.5 text-center focus:ring-nutri-emerald-500 dark:bg-nutri-bluegray-800 dark:border-nutri-bluegray-600 dark:text-text-dark-primary dark:placeholder-nutri-bluegray-500" data-field="prot">
            <input placeholder="fat" type="number" step="0.01" class="border rounded-xl p-2.5 text-center focus:ring-nutri-emerald-500 dark:bg-nutri-bluegray-800 dark:border-nutri-bluegray-600 dark:text-text-dark-primary dark:placeholder-nutri-bluegray-500" data-field="fat">
            <input placeholder="sugar" type="number" step="0.01" class="border rounded-xl p-2.5 text-center focus:ring-nutri-emerald-500 dark:bg-nutri-bluegray-800 dark:border-nutri-bluegray-600 dark:text-text-dark-primary dark:placeholder-nutri-bluegray-500" data-field="sug">
            <button onclick="removeFoodRow(this)" class="text-rose-500 hover:text-rose-700 dark:text-rose-400 dark:hover:text-rose-300 text-sm">×</button>
          </div>
        `;
      }

      function addFoodRow(mealId) {
        const container = document.getElementById(mealId + "_foods");
        const index = container.children.length;
        container.insertAdjacentHTML(
          "beforeend",
          createFoodRowHTML(mealId, index),
        );
        addInputListeners();
      }

      function removeFoodRow(btn) {
        btn.closest(".food-row").remove();
        computeTotals();
        autoSaveMeals();
      }

      function autoSaveMeals() {
        const mealsData = {};
        meals.forEach((m) => {
          const rows = document.querySelectorAll(`#${m.id}_foods .food-row`);
          mealsData[m.id] = [];
          rows.forEach((row) => {
            mealsData[m.id].push({
              name: row.querySelector('[data-field="name"]')?.value || "",
              cal: row.querySelector('[data-field="cal"]')?.value || "",
              prot: row.querySelector('[data-field="prot"]')?.value || "",
              fat: row.querySelector('[data-field="fat"]')?.value || "",
              sug: row.querySelector('[data-field="sug"]')?.value || "",
            });
          });
        });
        localStorage.setItem("nutriTempMeals", JSON.stringify(mealsData));
      }

      function loadTempMeals() {
        const saved = localStorage.getItem("nutriTempMeals");
        if (!saved) return;
        try {
          const data = JSON.parse(saved);
          meals.forEach((m) => {
            const container = document.getElementById(m.id + "_foods");
            if (!container) return;
            container.innerHTML = "";
            const mealData = data[m.id] || [];
            if (mealData.length === 0) {
              container.innerHTML = createFoodRowHTML(m.id, 0);
            } else {
              mealData.forEach((item, index) => {
                container.insertAdjacentHTML(
                  "beforeend",
                  createFoodRowHTML(m.id, index),
                );
                const row = container.lastElementChild;
                row.querySelector('[data-field="name"]').value =
                  item.name || "";
                row.querySelector('[data-field="cal"]').value = item.cal;
                row.querySelector('[data-field="prot"]').value = item.prot;
                row.querySelector('[data-field="fat"]').value = item.fat;
                row.querySelector('[data-field="sug"]').value = item.sug;
              });
            }
          });
          addInputListeners();
          computeTotals();
        } catch (e) {
          console.error("Error loading temp meals:", e);
        }
      }

      function autoSaveLiveFields() {
        const liveData = {
          weight: document.getElementById("weight").value,
          workout: document.getElementById("workout").value,
          date: document.getElementById("date").value,
        };
        localStorage.setItem("nutriLiveFields", JSON.stringify(liveData));
      }

      function loadLiveFields() {
        const saved = localStorage.getItem("nutriLiveFields");
        if (!saved) {
          document.getElementById("date").value = currentDate;
          return;
        }

        try {
          const data = JSON.parse(saved);
          if (data.weight) {
            document.getElementById("weight").value = data.weight;
          }
          if (data.workout) {
            document.getElementById("workout").value = data.workout;
          }

          const savedDate = data.date;
          const shouldKeepSavedDate =
            savedDate &&
            (savedDate === currentDate ||
              nutritionData.some((entry) => entry.date === savedDate));

          document.getElementById("date").value = shouldKeepSavedDate
            ? savedDate
            : currentDate;

          if (!shouldKeepSavedDate) {
            autoSaveLiveFields();
          }
        } catch (error) {
          console.error("Error loading live fields:", error);
          document.getElementById("date").value = currentDate;
        }
      }

      document
        .getElementById("weight")
        .addEventListener("input", autoSaveLiveFields);
      document
        .getElementById("workout")
        .addEventListener("change", autoSaveLiveFields);
      document
        .getElementById("date")
        .addEventListener("change", autoSaveLiveFields);

      function computeTotals() {
        let totals = { cal: 0, prot: 0, fat: 0, sug: 0 };
        meals.forEach((m) => {
          const rows = document.querySelectorAll(`#${m.id}_foods .food-row`);
          rows.forEach((row) => {
            totals.cal +=
              Number(row.querySelector('[data-field="cal"]').value) || 0;
            totals.prot +=
              Number(row.querySelector('[data-field="prot"]').value) || 0;
            totals.fat +=
              Number(row.querySelector('[data-field="fat"]').value) || 0;
            totals.sug +=
              Number(row.querySelector('[data-field="sug"]').value) || 0;
          });
        });

        document.getElementById("tcal").textContent = formatNumber(totals.cal);
        document.getElementById("tprot").textContent = formatNumber(
          totals.prot,
        );
        document.getElementById("tfat").textContent = formatNumber(totals.fat);
        document.getElementById("tsug").textContent = formatNumber(totals.sug);

        const targetCal =
          Number(document.getElementById("targetCal")?.value) || 1500;
        const targetProt =
          Number(document.getElementById("targetProt")?.value) || 100;
        const targetFat =
          Number(document.getElementById("targetFat")?.value) || 50;
        const targetSug =
          Number(document.getElementById("targetSug")?.value) || 30;

        const remainCal = Math.max(0, targetCal - totals.cal);
        const remainProt = Math.max(0, targetProt - totals.prot);
        const remainFat = Math.max(0, targetFat - totals.fat);
        const remainSug = Math.max(0, targetSug - totals.sug);

        document.getElementById("remainCal").textContent =
          formatNumber(remainCal);
        document.getElementById("remainProt").textContent =
          formatNumber(remainProt);
        document.getElementById("remainFat").textContent =
          formatNumber(remainFat);
        document.getElementById("remainSug").textContent =
          formatNumber(remainSug);

        const remainPercentValue =
          targetCal > 0 ? Math.max(0, (remainCal / targetCal) * 100) : 0;
        document.getElementById("remainPercent").textContent =
          `You have about ${formatNumber(remainPercentValue)}% more to eat healthy! 🥑`;

        const t = getTargets();
        updateStatus(
          "cal",
          totals.cal,
          t.cal.target,
          t.cal.max,
          document.getElementById("calStatus"),
        );
        updateStatus(
          "prot",
          totals.prot,
          t.prot.target,
          t.prot.max,
          document.getElementById("protStatus"),
        );
        updateStatus(
          "fat",
          totals.fat,
          t.fat.target,
          t.fat.max,
          document.getElementById("fatStatus"),
        );
        updateStatus(
          "sug",
          totals.sug,
          t.sug.target,
          t.sug.max,
          document.getElementById("sugStatus"),
        );
      }

      function updateStatus(key, value, target, max, el) {
        if (!el) return;
        if (value < target * 0.8) {
          el.textContent = "Below target";
          el.className = "status-low text-sm";
        } else if (value <= max) {
          el.textContent = "Good range ✓";
          el.className = "status-good text-sm";
        } else {
          el.textContent = "Above max ⚠";
          el.className = "status-high text-sm";
        }
      }

      function addInputListeners() {
        document.querySelectorAll('input[type="number"]').forEach((inp) => {
          inp.removeEventListener("input", computeTotals);
          inp.addEventListener("input", computeTotals);
          inp.removeEventListener("input", autoSaveMeals);
          inp.addEventListener("input", autoSaveMeals);
        });
      }

      function clearMeal(mealId) {
        document.getElementById(mealId + "_foods").innerHTML =
          createFoodRowHTML(mealId, 0);
        computeTotals();
        autoSaveMeals();
      }

      function clearToday() {
        const hasData = [
          ...document.querySelectorAll('input[type="number"]'),
        ].some((i) => i.value.trim() !== "");
        if (!hasData) {
          alert("Nothing to clear today.");
          return;
        }
        if (!confirm("Clear today's data?")) return;
        renderMeals();
        computeTotals();
        localStorage.removeItem("nutriTempMeals");
        localStorage.removeItem("nutriLiveFields");
      }

      function saveDay() {
        const date = document.getElementById("date").value;
        if (nutritionData.some((e) => e.date === date)) {
          if (!confirm(`Overwrite data for ${date}?`)) return;
          nutritionData = nutritionData.filter((e) => e.date !== date);
        }

        const entry = {
          date,
          weight: Number(document.getElementById("weight").value) || null,
          workout: document.getElementById("workout").value || "",
          meals: {},
        };

        meals.forEach((m) => {
          const rows = document.querySelectorAll(`#${m.id}_foods .food-row`);
          entry.meals[m.id] = [];
          rows.forEach((row) => {
            entry.meals[m.id].push({
              name: row.querySelector('[data-field="name"]')?.value || "",
              cal: Number(row.querySelector('[data-field="cal"]').value) || 0,
              prot: Number(row.querySelector('[data-field="prot"]').value) || 0,
              fat: Number(row.querySelector('[data-field="fat"]').value) || 0,
              sug: Number(row.querySelector('[data-field="sug"]').value) || 0,
            });
          });
        });

        nutritionData.push(entry);
        localStorage.setItem("nutritionData", JSON.stringify(nutritionData));
        updateStreak();
        renderHistory();
        alert(`Day ${date} saved! Keep going! 💪`);
        localStorage.removeItem("nutriTempMeals");
        localStorage.removeItem("nutriLiveFields");
      }

      function deleteDay(date) {
        if (!confirm(`Delete ${date}?`)) return;
        nutritionData = nutritionData.filter((d) => d.date !== date);
        localStorage.setItem("nutritionData", JSON.stringify(nutritionData));
        renderHistory();
        updateStreak();
      }

      function applyFoodToCurrentMeal(food, foodName) {
        const mealId = getCurrentMeal();
        const container = document.getElementById(mealId + "_foods");
        const lastRow = container.lastElementChild;
        const isFilled =
          lastRow &&
          [...lastRow.querySelectorAll("input")].some(
            (i) => i.value.trim() !== "",
          );

        if (isFilled || !lastRow) {
          addFoodRow(mealId);
        }

        const row = container.lastElementChild;
        row.querySelector('[data-field="name"]').value =
          foodName || "Searched food";
        row.querySelector('[data-field="cal"]').value = food.cal;
        row.querySelector('[data-field="prot"]').value = food.prot;
        row.querySelector('[data-field="fat"]').value = food.fat;
        row.querySelector('[data-field="sug"]').value = food.sug;

        computeTotals();
        autoSaveMeals();
        document.getElementById("foodInput").value = "";
        document.getElementById("lookupResults").innerHTML = "";
      }

      function getCurrentMeal() {
        const h = new Date().getHours();
        if (h < 11) return "breakfast";
        if (h < 15) return "lunch";
        if (h < 18) return "snack";
        return "dinner";
      }

      function loadStreak() {
        if (nutritionData.length === 0) {
          document.getElementById("streak").textContent = "0";
          return;
        }

        const uniqueDates = [
          ...new Set(nutritionData.map((entry) => entry.date)),
        ].sort((a, b) => a.localeCompare(b));

        let streak = 1;
        let runningStreak = 1;

        for (let i = 1; i < uniqueDates.length; i++) {
          const diff = diffDays(
            parseLocalDate(uniqueDates[i]),
            parseLocalDate(uniqueDates[i - 1]),
          );

          if (diff === 1) {
            runningStreak += 1;
          } else if (diff > 1) {
            runningStreak = 1;
          }

          streak = runningStreak;
        }

        const lastSavedDate = uniqueDates.at(-1);
        const todayDiff = lastSavedDate
          ? diffDays(parseLocalDate(currentDate), parseLocalDate(lastSavedDate))
          : 0;

        if (!uniqueDates.includes(currentDate) && todayDiff === 1) {
          streak += 1;
        }

        document.getElementById("streak").textContent = String(streak);
      }

      function updateStreak() {
        loadStreak();
      }

      function getAverageKcalAllTime() {
        if (nutritionData.length === 0) return 0;
        let total = 0;
        nutritionData.forEach((e) => {
          let sum = 0;
          Object.values(e.meals)
            .flat()
            .forEach((f) => (sum += f.cal));
          total += sum;
        });
        return Math.round(total / nutritionData.length);
      }

      function getAverageProteinAllTime() {
        if (nutritionData.length === 0) return 0;
        let total = 0;
        nutritionData.forEach((e) => {
          let sum = 0;
          Object.values(e.meals)
            .flat()
            .forEach((f) => (sum += f.prot));
          total += sum;
        });
        return Math.round(total / nutritionData.length);
      }

      const quotes = [
        "Consistency beats intensity.",
        "Small steps daily create big results.",
        "Discipline builds freedom.",
        "Progress > perfection.",
        "You already made it to day 100 — the rest is just momentum.",
        "I love you, but I don't need you.",
      ];
      function newQuote() {
        const q = quotes[Math.floor(Math.random() * quotes.length)];
        document.getElementById("quote").textContent = q;
      }

      function showReport() {
        const modal = document.createElement("div");
        modal.className =
          "fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4";
        modal.innerHTML = `
          <div class="bg-white dark:bg-card-dark rounded-2xl p-6 max-w-4xl w-full max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
              <h2 class="text-2xl font-bold text-nutri-bluegray-900 dark:text-text-dark-primary">Your Progress Report</h2>
              <button class="text-rose-600 hover:text-rose-800 text-3xl leading-none" onclick="this.closest('.fixed').remove()">×</button>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8 text-center">
              <div class="p-4 bg-nutri-bluegray-50 dark:bg-nutri-bluegray-800 rounded-xl">
                <div class="text-2xl font-bold text-nutri-bluegray-900 dark:text-text-dark-primary">${nutritionData.length}</div>
                <div class="text-sm text-nutri-bluegray-600 dark:text-text-dark-secondary">Days Tracked</div>
              </div>
              <div class="p-4 bg-nutri-bluegray-50 dark:bg-nutri-bluegray-800 rounded-xl">
                <div class="text-2xl font-bold text-nutri-bluegray-900 dark:text-text-dark-primary">${getAverageKcalAllTime()}</div>
                <div class="text-sm text-nutri-bluegray-600 dark:text-text-dark-secondary">Avg kcal (all time)</div>
              </div>
              <div class="p-4 bg-nutri-bluegray-50 dark:bg-nutri-bluegray-800 rounded-xl">
                <div class="text-2xl font-bold text-nutri-bluegray-900 dark:text-text-dark-primary">${getAverageProteinAllTime()}</div>
                <div class="text-sm text-nutri-bluegray-600 dark:text-text-dark-secondary">Avg protein (all time)</div>
              </div>
            </div>
            <canvas id="progressChart" class="w-full h-80 mb-8"></canvas>
            <div class="overflow-x-auto">
              <table class="w-full text-sm text-left">
                <thead class="bg-nutri-bluegray-100 dark:bg-nutri-bluegray-800">
                  <tr>
                    <th class="p-3 text-nutri-bluegray-900 dark:text-text-dark-primary">Date</th>
                    <th class="p-3 text-nutri-bluegray-900 dark:text-text-dark-primary">kcal</th>
                    <th class="p-3 text-nutri-bluegray-900 dark:text-text-dark-primary">Protein (g)</th>
                    <th class="p-3 text-nutri-bluegray-900 dark:text-text-dark-primary">Workout</th>
                  </tr>
                </thead>
                <tbody>
                  ${nutritionData
                    .slice(-14)
                    .reverse()
                    .map((e) => {
                      let kcalSum = 0,
                        protSum = 0;
                      Object.values(e.meals)
                        .flat()
                        .forEach((f) => {
                          kcalSum += f.cal;
                          protSum += f.prot;
                        });
                      return `
                      <tr class="border-b dark:border-nutri-bluegray-700">
                        <td class="p-3 text-nutri-bluegray-900 dark:text-text-dark-primary">${e.date}</td>
                        <td class="p-3 text-nutri-bluegray-900 dark:text-text-dark-primary">${Math.round(kcalSum)}</td>
                        <td class="p-3 text-nutri-bluegray-900 dark:text-text-dark-primary">${Math.round(protSum)}</td>
                        <td class="p-3 text-nutri-bluegray-900 dark:text-text-dark-primary">${e.workout || "-"}</td>
                      </tr>
                    `;
                    })
                    .join("")}
                </tbody>
              </table>
            </div>
          </div>
        `;
        document.body.appendChild(modal);

        setTimeout(() => {
          const canvas = document.getElementById("progressChart");
          if (!canvas) return;

          const sorted = [...nutritionData].sort((a, b) =>
            a.date.localeCompare(b.date),
          );
          const labels = sorted.map((e) => e.date.slice(5));
          const kcalData = sorted.map((e) => {
            let sum = 0;
            Object.values(e.meals)
              .flat()
              .forEach((f) => (sum += f.cal));
            return sum;
          });
          const protData = sorted.map((e) => {
            let sum = 0;
            Object.values(e.meals)
              .flat()
              .forEach((f) => (sum += f.prot));
            return sum;
          });

          new Chart(canvas, {
            type: "line",
            data: {
              labels,
              datasets: [
                {
                  label: "Daily kcal",
                  data: kcalData,
                  borderColor: "#10b981",
                  backgroundColor: "rgba(16, 185, 129, 0.15)",
                  tension: 0.3,
                  fill: true,
                  yAxisID: "y",
                },
                {
                  label: "Daily protein (g)",
                  data: protData,
                  borderColor: "#8b5cf6",
                  backgroundColor: "rgba(139, 92, 246, 0.15)",
                  tension: 0.3,
                  fill: true,
                  yAxisID: "y1",
                },
              ],
            },
            options: {
              responsive: true,
              interaction: { mode: "index", intersect: false },
              scales: {
                y: {
                  type: "linear",
                  display: true,
                  position: "left",
                  title: { display: true, text: "kcal" },
                },
                y1: {
                  type: "linear",
                  display: true,
                  position: "right",
                  title: { display: true, text: "Protein (g)" },
                  grid: { drawOnChartArea: false },
                  suggestedMin: 0,
                  suggestedMax: 150,
                },
              },
              plugins: {
                annotation: {
                  annotations: {
                    targetLine: {
                      type: "line",
                      yMin: 1500,
                      yMax: 1500,
                      borderColor: "#ef4444",
                      borderWidth: 2,
                      borderDash: [6, 6],
                      label: {
                        enabled: true,
                        content: "Target 1500 kcal",
                        position: "end",
                        backgroundColor: "#ef4444",
                        color: "white",
                      },
                    },
                  },
                },
              },
            },
          });
        }, 0);
      }
      function exportData() {
        const data = {
          nutritionData: nutritionData,
          personalizedFoods: loadPersonalizedFoods(),
          exportDate: new Date().toISOString(),
          appName: "NutriTrack",
        };

        const dataStr = JSON.stringify(data, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);

        const link = document.createElement("a");
        link.href = url;
        link.download = `nutritrack-backup-${new Date().toISOString().split("T")[0]}.json`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);

        alert("📤 Data exported! Check your Downloads folder.");
      }

      function importData(input) {
        const file = input.files[0];
        if (!file) return;

        if (!confirm("⚠️ This will REPLACE your current data. Continue?")) {
          input.value = "";
          return;
        }

        const reader = new FileReader();
        reader.onload = function (e) {
          try {
            const data = JSON.parse(e.target.result);

            if (data.nutritionData) {
              nutritionData = data.nutritionData;
              localStorage.setItem(
                "nutritionData",
                JSON.stringify(nutritionData),
              );
            }

            if (data.personalizedFoods) {
              savePersonalizedFoods(data.personalizedFoods);
            }

            renderHistory();
            updateStreak();
            loadTempMeals();

            alert("📥 Data imported successfully! Welcome back! 🎉");
          } catch (err) {
            alert(
              "❌ Error reading file. Make sure it's a valid NutriTrack backup.",
            );
            console.error(err);
          }
          input.value = "";
        };
        reader.readAsText(file);
      }
      let showingAllHistory = false;

      function toggleHistoryView() {
        showingAllHistory = !showingAllHistory;
        const btn = document.getElementById("historyToggle");
        btn.innerHTML = showingAllHistory ? "📅 Show Recent" : "📅 Show All";
        renderHistory();
      }

      function renderHistory() {
        const container = document.getElementById("history");
        container.innerHTML = "";

        let displayData = [...nutritionData].reverse();

        if (!showingAllHistory && displayData.length > 3) {
          displayData = displayData.slice(0, 3);
        }

        displayData.forEach((e) => {
          let cal = 0,
            prot = 0,
            fat = 0,
            sug = 0;
          Object.values(e.meals)
            .flat()
            .forEach((f) => {
              cal += f.cal;
              prot += f.prot;
              fat += f.fat;
              sug += f.sug;
            });

          const t = getTargets();
          const calStatus =
            cal < t.cal.target * 0.8 ? "↓" : cal > t.cal.max ? "↑" : "✓";
          const protStatus =
            prot < t.prot.target * 0.8 ? "↓" : prot > t.prot.max ? "↑" : "✓";
          const fatStatus =
            fat < t.fat.target * 0.8 ? "↓" : fat > t.fat.max ? "↑" : "✓";
          const sugStatus =
            sug < t.sug.target * 0.8 ? "↓" : sug > t.sug.max ? "↑" : "✓";

          const workoutText = e.workout ? ` • ${e.workout}` : "";
          const div = document.createElement("div");
          div.className =
            "card flex justify-between items-center py-3 px-4 text-sm";
          div.innerHTML = `
      <div>
        <div class="font-medium text-nutri-bluegray-900 dark:text-text-dark-primary">${e.date}</div>
        <div class="text-nutri-bluegray-500 dark:text-nutri-bluegray-400">
          ${Math.round(cal)} kcal ${calStatus} • ${Math.round(prot)}g prot ${protStatus} • ${Math.round(fat)}g fat ${fatStatus} • ${Math.round(sug)}g sug ${sugStatus}${workoutText}
        </div>
      </div>
      <button onclick="deleteDay('${e.date}')" class="text-rose-500 hover:text-rose-700 dark:text-rose-400 dark:hover:text-rose-300 text-lg">🗑</button>
    `;
          container.appendChild(div);
        });

        if (!showingAllHistory && nutritionData.length > 10) {
          const hint = document.createElement("div");
          hint.className =
            "text-center text-xs text-nutri-bluegray-400 dark:text-nutri-bluegray-500 mt-2";
          hint.innerHTML = `Showing last 10 entries • ${nutritionData.length - 10} older entries hidden`;
          container.appendChild(hint);
        }
      }
    </script>
    <script src="foods.js"></script>
  </body>
